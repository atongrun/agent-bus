<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Bus · Events</title>
  <style nonce="__CSP_NONCE__">
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #13171c;
      --panel-raised: #191e25;
      --border: #2a313a;
      --text: #f2f5f7;
      --muted: #929daa;
      --accent: #77bdfb;
      --pending: #f6c85f;
      --delivered: #75bfff;
      --failed: #ff7777;
      --acked: #6ed69a;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 20% -10%, #18324a 0, transparent 34rem),
        var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select {
      cursor: pointer;
    }

    .shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: -0.04em;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .subtitle,
    .refresh-state {
      color: var(--muted);
    }

    .subtitle {
      margin: 6px 0 0;
    }

    .refresh-state {
      flex: 0 0 auto;
      text-align: right;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary button {
      min-height: 84px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel) 93%, transparent);
      color: var(--text);
      text-align: left;
      transition: border-color 120ms ease, background 120ms ease;
    }

    .summary button:hover,
    .summary button:focus-visible,
    .summary button.selected {
      border-color: var(--accent);
      background: var(--panel-raised);
      outline: none;
    }

    .summary .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .summary .count {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      font-weight: 720;
      letter-spacing: -0.03em;
    }

    .summary [data-status="pending"] .count {
      color: var(--pending);
    }

    .summary [data-status="delivered"] .count {
      color: var(--delivered);
    }

    .summary [data-status="failed"] .count {
      color: var(--failed);
    }

    .summary [data-status="acked"] .count {
      color: var(--acked);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel) 96%, transparent);
      box-shadow: 0 18px 55px rgb(0 0 0 / 24%);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 170px auto;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    input,
    select,
    .secondary {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f1318;
      color: var(--text);
    }

    input,
    select {
      width: 100%;
      padding: 8px 11px;
    }

    input:focus,
    select:focus,
    .secondary:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .secondary {
      padding: 8px 14px;
    }

    .notice {
      display: none;
      margin: 0;
      padding: 11px 14px;
      border-bottom: 1px solid #65363a;
      background: #331d20;
      color: #ffb3b3;
    }

    .notice.visible {
      display: block;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel-raised);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover {
      background: rgb(255 255 255 / 2.5%);
    }

    tbody tr.failed {
      background: rgb(255 119 119 / 5%);
    }

    .mono,
    pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .mono {
      font-size: 12px;
    }

    .route {
      white-space: nowrap;
    }

    .arrow {
      padding: 0 4px;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border: 1px solid currentColor;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .badge.pending {
      color: var(--pending);
    }

    .badge.delivered {
      color: var(--delivered);
    }

    .badge.failed {
      color: var(--failed);
    }

    .badge.acked {
      color: var(--acked);
    }

    details {
      max-width: min(620px, 70vw);
    }

    summary {
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }

    pre {
      max-height: 320px;
      overflow: auto;
      margin: 8px 0 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #090c0f;
      color: #dbe4ec;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-text {
      max-width: 280px;
      color: #ffaaaa;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      padding: 52px 20px;
      color: var(--muted);
      text-align: center;
    }

    .footer {
      display: flex;
      justify-content: center;
      padding: 14px;
      border-top: 1px solid var(--border);
    }

    .footer[hidden] {
      display: none;
    }

    @media (max-width: 850px) {
      .shell {
        padding: 18px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .refresh-state {
        text-align: left;
      }

      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary button:first-child {
        grid-column: 1 / -1;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 650px) {
      .shell {
        padding: 12px;
      }

      .panel {
        overflow: visible;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .toolbar {
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .table-wrap {
        overflow: visible;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
      }

      thead {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      tbody {
        display: grid;
        gap: 10px;
      }

      tbody tr {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
      }

      tbody td {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
      }

      tbody td::before {
        color: var(--muted);
        content: attr(data-label);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      tbody td:last-child {
        border-bottom: 0;
      }

      details {
        max-width: 100%;
      }

      .footer {
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">Read-only event observer</p>
        <h1>Agent Bus</h1>
        <p class="subtitle">All identities · All durable states · Raw payloads</p>
      </div>
      <div class="refresh-state">
        <div id="refresh-label">Loading events…</div>
        <div>Auto-refresh every 5 seconds</div>
      </div>
    </header>

    <section class="summary" aria-label="Event status counts">
      <button class="selected" data-status="" type="button">
        <span class="label">All events</span>
        <span class="count" id="count-all">0</span>
      </button>
      <button data-status="pending" type="button">
        <span class="label">Pending</span>
        <span class="count" id="count-pending">0</span>
      </button>
      <button data-status="delivered" type="button">
        <span class="label">Delivered</span>
        <span class="count" id="count-delivered">0</span>
      </button>
      <button data-status="failed" type="button">
        <span class="label">Failed</span>
        <span class="count" id="count-failed">0</span>
      </button>
      <button data-status="acked" type="button">
        <span class="label">ACKed</span>
        <span class="count" id="count-acked">0</span>
      </button>
    </section>

    <section class="panel" aria-label="Events">
      <div class="toolbar">
        <input
          id="search"
          type="search"
          placeholder="Search ID, identity, type, payload, or error"
          aria-label="Search events"
        >
        <select id="status" aria-label="Filter by status">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="delivered">Delivered</option>
          <option value="failed">Failed</option>
          <option value="acked">ACKed</option>
        </select>
        <button class="secondary" id="refresh" type="button">Refresh now</button>
      </div>
      <p class="notice" id="notice" role="alert"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Created</th>
              <th>Route</th>
              <th>Type</th>
              <th>Task ID</th>
              <th>Status</th>
              <th>Retries</th>
              <th>Last error</th>
              <th>Payload</th>
            </tr>
          </thead>
          <tbody id="events"></tbody>
        </table>
        <div class="empty" id="empty" hidden>No events match this view.</div>
      </div>
      <div class="footer" id="footer" hidden>
        <button class="secondary" id="older" type="button">Load older events</button>
      </div>
    </section>
  </main>

  <script nonce="__CSP_NONCE__">
    "use strict";

    const state = {
      events: [],
      expandedPayloadIds: new Set(),
      hasMore: false,
      nextBeforeId: null,
      olderLoaded: false,
      loading: false,
    };

    const elements = {
      empty: document.querySelector("#empty"),
      events: document.querySelector("#events"),
      footer: document.querySelector("#footer"),
      notice: document.querySelector("#notice"),
      older: document.querySelector("#older"),
      refresh: document.querySelector("#refresh"),
      refreshLabel: document.querySelector("#refresh-label"),
      search: document.querySelector("#search"),
      status: document.querySelector("#status"),
      summaryButtons: document.querySelectorAll(".summary button"),
    };

    const labels = [
      "ID",
      "Created",
      "Route",
      "Type",
      "Task ID",
      "Status",
      "Retries",
      "Last error",
      "Payload",
    ];

    function setNotice(message) {
      elements.notice.textContent = message;
      elements.notice.classList.toggle("visible", Boolean(message));
    }

    function eventTime(value) {
      if (!value) return "—";
      const normalized = value.includes("T") ? value : `${value.replace(" ", "T")}Z`;
      const date = new Date(normalized);
      return Number.isNaN(date.valueOf()) ? value : date.toLocaleString();
    }

    function addCell(row, content, className = "") {
      const cell = document.createElement("td");
      cell.dataset.label = labels[row.children.length];
      if (className) cell.className = className;
      if (content instanceof Node) {
        cell.append(content);
      } else {
        cell.textContent = content;
      }
      row.append(cell);
    }

    function details(label, value, eventId) {
      const wrapper = document.createElement("details");
      const summary = document.createElement("summary");
      const body = document.createElement("pre");
      wrapper.open = state.expandedPayloadIds.has(eventId);
      wrapper.addEventListener("toggle", () => {
        if (wrapper.open) {
          state.expandedPayloadIds.add(eventId);
          elements.refreshLabel.textContent =
            "Auto-refresh paused while a payload is open";
        } else {
          state.expandedPayloadIds.delete(eventId);
          if (state.expandedPayloadIds.size === 0) {
            elements.refreshLabel.textContent = "Refreshing…";
            loadEvents();
          }
        }
      });
      summary.textContent = label;
      body.textContent = value;
      wrapper.append(summary, body);
      return wrapper;
    }

    function renderEvents() {
      const fragment = document.createDocumentFragment();
      for (const event of state.events) {
        const row = document.createElement("tr");
        row.className = event.status;

        addCell(row, String(event.id), "mono");
        addCell(row, eventTime(event.created_at));

        const route = document.createElement("span");
        route.className = "route";
        const sender = document.createElement("span");
        const arrow = document.createElement("span");
        const recipient = document.createElement("span");
        sender.textContent = event.from_agent;
        arrow.className = "arrow";
        arrow.textContent = "→";
        recipient.textContent = event.to_agent;
        route.append(sender, arrow, recipient);
        addCell(row, route);

        addCell(row, event.type, "mono");
        addCell(row, String(event.payload?.task_id ?? "—"), "mono");

        const badge = document.createElement("span");
        badge.className = `badge ${event.status}`;
        badge.textContent = event.status;
        addCell(row, badge);

        addCell(row, String(event.retry_count));

        const error = document.createElement("span");
        error.className = "error-text";
        error.textContent = event.last_error ?? "—";
        addCell(row, error);

        addCell(
          row,
          details("View raw", JSON.stringify(event.payload, null, 2), event.id),
        );
        fragment.append(row);
      }

      elements.events.replaceChildren(fragment);
      elements.empty.hidden = state.events.length !== 0;
      elements.footer.hidden = !state.hasMore;
    }

    function renderCounts(counts) {
      const total = Object.values(counts).reduce((sum, count) => sum + count, 0);
      document.querySelector("#count-all").textContent = String(total);
      for (const status of ["pending", "delivered", "failed", "acked"]) {
        document.querySelector(`#count-${status}`).textContent = String(
          counts[status] ?? 0,
        );
      }
    }

    function currentParams(append) {
      const params = new URLSearchParams({ limit: "100" });
      if (elements.status.value) params.set("status", elements.status.value);
      if (elements.search.value.trim()) params.set("q", elements.search.value.trim());
      if (append && state.nextBeforeId) {
        params.set("before_id", String(state.nextBeforeId));
      }
      return params;
    }

    async function loadEvents({ append = false } = {}) {
      if (state.loading) return;
      state.loading = true;
      elements.refresh.disabled = true;
      elements.older.disabled = true;

      try {
        const response = await fetch(
          `/operator/api/events?${currentParams(append)}`,
          { credentials: "same-origin", headers: { Accept: "application/json" } },
        );
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        state.events = append ? state.events.concat(data.items) : data.items;
        state.hasMore = data.has_more;
        state.nextBeforeId = data.next_before_id;
        state.olderLoaded = append || state.olderLoaded;
        renderCounts(data.counts);
        renderEvents();
        setNotice("");
        elements.refreshLabel.textContent =
          `Updated ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        setNotice(`Refresh failed. Showing the last successful result. ${error.message}`);
        elements.refreshLabel.textContent = "Data may be stale";
      } finally {
        state.loading = false;
        elements.refresh.disabled = false;
        elements.older.disabled = false;
      }
    }

    function resetAndLoad() {
      state.events = [];
      state.hasMore = false;
      state.nextBeforeId = null;
      state.olderLoaded = false;
      loadEvents();
    }

    function syncSummarySelection() {
      for (const button of elements.summaryButtons) {
        button.classList.toggle(
          "selected",
          button.dataset.status === elements.status.value,
        );
      }
    }

    let searchTimer;
    elements.search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(resetAndLoad, 250);
    });
    elements.status.addEventListener("change", () => {
      syncSummarySelection();
      resetAndLoad();
    });
    elements.refresh.addEventListener("click", resetAndLoad);
    elements.older.addEventListener("click", () => loadEvents({ append: true }));

    for (const button of elements.summaryButtons) {
      button.addEventListener("click", () => {
        elements.status.value = button.dataset.status;
        syncSummarySelection();
        resetAndLoad();
      });
    }

    setInterval(() => {
      if (
        document.visibilityState === "visible"
        && !state.olderLoaded
        && state.expandedPayloadIds.size === 0
      ) {
        loadEvents();
      }
    }, 5000);

    loadEvents();
  </script>
</body>
</html>
