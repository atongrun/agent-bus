name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install verification tools
        run: python -m pip install uv ruff
      - name: Lint
        run: ruff check client server tests
      - name: Compile
        run: python -m compileall -q client server tests
      - name: Unit and integration tests
        run: bash scripts/test.sh
      - name: Docker build, persistence, and event acceptance
        run: bash scripts/test-docker.sh
