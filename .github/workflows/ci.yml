name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install verification tools
        run: python -m pip install uv ruff
      - name: Lint
        run: ruff check --select E4,E7,E9,F client server tests scripts/test-client-setup.py
      - name: Compile
        run: python -m compileall -q client server tests scripts/test-client-setup.py
      - name: Unit and integration tests
        run: bash scripts/test.sh
      - name: Docker build, persistence, and event acceptance
        run: bash scripts/test-docker.sh

  windows-client-setup:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
      - name: Install project and Agent Bus tool
        run: |
          uv sync --locked --python 3.12
          uv tool install --python 3.12 .
      - name: Cross-platform client setup acceptance
        run: uv run python scripts/test-client-setup.py
